  <!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src https://api.openweathermap.org; media-src 'self' blob:; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'">
  <meta name="theme-color" content="#1a1f33">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="/icons/icon-192.png" type="image/png" />
  <title>Clima Smart TV</title>
</head>
<body>
  <video id="bg-video" class="bg-video" autoplay muted loop playsinline aria-hidden="true">
    <source src="assets/videos/clear.mp4" type="video/mp4">
  </video>

  <div class="safe-zone" role="main" aria-label="Información del clima">
    <header class="app-header">
      <div class="header-left">
        <h1 class="app-title">Clima México</h1>
        <time id="clock" class="clock" datetime="2026-01-01T00:00:00-06:00" aria-live="polite">--:--:--</time>
      </div>
      <div class="header-right">
        <p id="current-date" class="current-date">----</p>
        <p id="current-condition" class="current-condition">--</p>
      </div>
    </header>

    <section class="city-grid" aria-label="Pronóstico por ciudad">
      <article class="city-card" id="card-queretaro" data-city="Queretaro" tabindex="0" role="button" aria-label="Clima en Querétaro">
        <h2 class="city-name">Querétaro</h2>
        <p class="temperature" id="temp-queretaro">--°C</p>
        <p class="condition" id="condition-queretaro">--</p>
        <p class="humidity" id="humidity-queretaro">--% humedad</p>
      </article>
      <article class="city-card" id="card-cdmx" data-city="Ciudad de Mexico" tabindex="0" role="button" aria-label="Clima en Ciudad de México">
        <h2 class="city-name">Cd. de México</h2>
        <p class="temperature" id="temp-cdmx">--°C</p>
        <p class="condition" id="condition-cdmx">--</p>
        <p class="humidity" id="humidity-cdmx">--% humedad</p>
      </article>
      <article class="city-card" id="card-guadalajara" data-city="Guadalajara" tabindex="0" role="button" aria-label="Clima en Guadalajara">
        <h2 class="city-name">Guadalajara</h2>
        <p class="temperature" id="temp-guadalajara">--°C</p>
        <p class="condition" id="condition-guadalajara">--</p>
        <p class="humidity" id="humidity-guadalajara">--% humedad</p>
      </article>
      <article class="city-card" id="card-monterrey" data-city="Monterrey" tabindex="0" role="button" aria-label="Clima en Monterrey">
        <h2 class="city-name">Monterrey</h2>
        <p class="temperature" id="temp-monterrey">--°C</p>
        <p class="condition" id="condition-monterrey">--</p>
        <p class="humidity" id="humidity-monterrey">--% humedad</p>
      </article>
    </section>

    <footer class="app-footer">
      <p class="update-info">Actualización cada 10 min · PWA Clima Smart TV</p>
    </footer>
  </div>

  <script src="js/config.local.js"></script>
  <script src="js/weather.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
